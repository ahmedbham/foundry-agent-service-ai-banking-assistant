server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /chat {
        proxy_pass ${MIDDLE_TIER_URL}/chat;
        proxy_http_version 1.1;
        proxy_set_header Host ${MIDDLE_TIER_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_ssl_name ${MIDDLE_TIER_HOST};
        proxy_buffering off;
        proxy_cache off;
    }

    location /health {
        proxy_pass ${MIDDLE_TIER_URL}/health;
        proxy_ssl_server_name on;
        proxy_ssl_name ${MIDDLE_TIER_HOST};
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
